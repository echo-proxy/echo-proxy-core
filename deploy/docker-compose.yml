# docker-compose for end-to-end WebTransport verification
#
# Services
#   echo-server — Rust WebTransport proxy server (port 4433 UDP)
#
# Usage:
#   # 1. Generate TLS certs
#   bash deploy/gen-certs.sh
#
#   # 2. Build the Rust server image
#   docker compose -f deploy/docker-compose.yml build
#
#   # 3. Start the server
#   docker compose -f deploy/docker-compose.yml up
#
#   # 4. Run the client
#   cargo run -p client -- \
#     --endpoint https://<host>:4433/ \
#     --user alice \
#     --cert-hash <hash printed by gen-certs.sh>
#

services:
  echo-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    command:
      - --host=0.0.0.0
      - --port=4433
      - --cert=/etc/echo-proxy/certs/server.crt
      - --key=/etc/echo-proxy/certs/server.key
      - --users=alice
    volumes:
      - ./certs:/etc/echo-proxy/certs:ro
    ports:
      - "4433:4433/udp"
